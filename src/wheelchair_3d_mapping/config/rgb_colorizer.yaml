rgb_cloud_colorizer_node:
  ros__parameters:
    input_cloud_topic: /points_merged
    output_topic: /rgb_cloud_map
    lidar_frame: base_link
    default_gray: 128
    tf_timeout_sec: 0.1
    # USB camera timestamps are not phase-locked to the XT-M60 packets on this
    # platform. Real mapping showed ~0.8 s image/cloud skew, and this is only a
    # user-facing color overlay, so keep a wider visual-only tolerance here.
    max_image_age_sec: 1.25

    # Main (left) camera. Physical topics so it works without the alias relay.
    image_topic: /camera/left/image_raw
    camera_info_topic: /camera/left/camera_info
    # APPROXIMATE forward-camera extrinsic (T_camera_optical_from_base_link),
    # NOT calibrated - assumes camera at ~(0.40,0.10,0.80) looking forward.
    # Colors are roughly placed; refine with PnP (scripts/solve_cam_lidar_extrinsic.py) later.
    cam_lidar_translation: [0.10, 0.80, -0.40]
    cam_lidar_quaternion: [0.5, -0.5, 0.5, 0.5]

    # Aux (right) camera - colorization only, also approximate.
    aux_image_topic: /camera/right/image_raw
    aux_camera_info_topic: /camera/right/camera_info
    aux_cam_lidar_translation: [-0.10, 0.80, -0.40]
    aux_cam_lidar_quaternion: [0.5, -0.5, 0.5, 0.5]
