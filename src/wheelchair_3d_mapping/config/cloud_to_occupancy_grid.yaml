cloud_to_occupancy_grid_node:
  ros__parameters:
    # Source 3D cloud. /livo/cloud_registered (live) or /livo/map_cloud (full map).
    input_cloud_topic: /livo/cloud_registered
    output_map_topic: /map_2d_from_3d
    map_frame: livo_map   # match LIVO global frame (livo_interface.yaml) so no map->livo_map TF is needed; set to 'map' once that TF exists

    resolution: 0.05

    # Points in [obstacle_z_min, obstacle_z_max] become occupied; points in
    # [ground_z_min, ground_z_max] become free. Z is in map_frame (gravity up).
    obstacle_z_min: 0.15
    obstacle_z_max: 1.80
    ground_z_min: -0.30
    ground_z_max: 0.15

    inflation_radius: 0.30

    unknown_value: -1
    free_value: 0
    occupied_value: 100

    # rolling: origin/size auto-fit the current cloud each cycle.
    # static: use origin_x/y + map_width_m/height_m below.
    rolling_or_static: rolling
    margin_m: 1.0
    map_width_m: 40.0
    map_height_m: 40.0
    origin_x: -20.0
    origin_y: -20.0
    max_cells: 4000

    publish_rate_hz: 2.0
    tf_timeout_sec: 0.1
