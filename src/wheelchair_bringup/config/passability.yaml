passability_analyzer_node:
  ros__parameters:
    scan_topic: /scan
    status_topic: /passability/status
    wheelchair_width_m: 0.70
    clearance_margin_m: 0.15
    warning_margin_m: 0.20
    lookahead_distance_m: 1.8
    min_forward_distance_m: 0.25
    max_side_distance_m: 2.0
    # Hard-block only for obstacles imminently in front within this range; the
    # Nav2 costmap + safety scan-distance stop handle farther avoidance so the
    # chair is not frozen for anything within lookahead.
    block_forward_distance_m: 0.6
