camera_adapter_node:
  ros__parameters:
    mode: real
    publish_rate_hz: 15.0
    width: 640
    height: 480
    fps: 30.0
    # Two identical UVC cameras expose capture nodes on EVEN /dev/video indices
    # (0,2); ODD indices (1,3) are metadata-only and CANNOT capture. Verified on
    # this Orin: /dev/video0 captures; /dev/video2 currently does NOT open
    # (check the 2nd camera cable/port/bandwidth). Confirm left vs right and pin
    # with udev/by-id (the two cameras share an identical by-id name).
    enabled_cameras: [left, right]
    left_device: "0"
    right_device: "2"
    front_device: "0"
    rear_device: "3"
    # Rotate a physically mis-mounted camera before publishing: 0/90/180/270 deg.
    left_rotate_deg: 0
    right_rotate_deg: 0
    front_rotate_deg: 0
    rear_rotate_deg: 0
