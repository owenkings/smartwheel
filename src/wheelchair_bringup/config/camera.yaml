camera_adapter_node:
  ros__parameters:
    mode: real
    # Cameras are for mapping imagery / colorization only (one also feeds LIVO).
    # MJPG + modest fps keeps USB bandwidth low so two cameras coexist on one bus.
    # If bandwidth is still tight, drop to width:320 height:240 or fps:10.
    fourcc: "MJPG"
    publish_rate_hz: 12.0
    width: 640
    height: 480
    fps: 15.0
    # Two identical UVC cameras expose capture nodes on EVEN /dev/video indices
    # (0,2); ODD indices (1,3) are metadata-only and CANNOT capture. Verified on
    # this Orin (2026-06-11): both cameras present -> /dev/video0 (left) and
    # /dev/video2 (right) capture; video1/video3 are metadata-only. Both front
    # cameras enabled and visualized independently in RViz.
    enabled_cameras: [left, right]
    left_device: "0"
    right_device: "2"
    front_device: "0"
    rear_device: "3"
    # Rotate a physically mis-mounted camera before publishing: 0/90/180/270 deg.
    left_rotate_deg: 180
    right_rotate_deg: 180
    front_rotate_deg: 0
    rear_rotate_deg: 0
    # Calibrated intrinsics (camera_info). Empty = camera_info not published.
    # Fill after running camera_calibration (see docs/calibration_checklist.md).
    left_camera_info_url: "/home/nvidia/smartwheel/calib/left.yaml"
    right_camera_info_url: "/home/nvidia/smartwheel/calib/right.yaml"
    front_camera_info_url: ""
    rear_camera_info_url: ""
