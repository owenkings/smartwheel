safety_supervisor_node:
  ros__parameters:
    # UNMANNED autonomy profile (no passenger, clear test area).
    # Distance policy: >=1.5 m normal, 0.5-1.5 m slowdown, <0.5 m stop,
    # <0.3 m emergency stop. Threshold comparisons are strict in the supervisor.
    cmd_vel_nav_topic: /cmd_vel_nav
    cmd_vel_safe_topic: /cmd_vel_safe
    scan_topic: /scan
    safety_state_topic: /safety_state
    emergency_stop_hw_topic: /emergency_stop_hw
    emergency_stop_sw_topic: /emergency_stop_sw
    ultrasonic_topics:
      - /ultrasonic/range_0
      - /ultrasonic/range_1
      - /ultrasonic/range_2
      - /ultrasonic/range_3
    # Four-sensor layout:
    #   range_0/address 1 = left-front, range_1/address 2 = left side
    #   range_2/address 3 = right-front, range_3/address 4 = right side
    front_ultrasonic_topics:
      - /ultrasonic/range_0
      - /ultrasonic/range_2
    side_ultrasonic_topics:
      - /ultrasonic/range_1
      - /ultrasonic/range_3
    max_auto_speed: 0.05
    debug_max_speed: 0.08
    hard_max_speed: 0.10
    max_angular_speed: 0.22
    allow_reverse_motion: false
    allow_rotation_when_blocked: true
    max_reverse_speed: 0.10
    rotate_in_place_angular_threshold: 0.05
    rotation_stop_distance: 0.50
    warning_distance: 1.50
    slowdown_distance: 1.50
    stop_distance: 0.50
    emergency_distance: 0.30
    front_ultrasonic_stop_distance: 0.50
    front_ultrasonic_slowdown_distance: 1.50
    front_ultrasonic_emergency_distance: 0.30
    side_ultrasonic_stop_distance: 0.50
    side_ultrasonic_warning_distance: 1.50
    side_ultrasonic_emergency_distance: 0.30
    t_delay: 0.35
    a_brake: 0.8
    d_margin: 0.08
    front_angle_min_deg: -70.0
    front_angle_max_deg: 70.0
    publish_rate_hz: 20.0
    stale_timeout_sec: 1.0
    ultrasonic_stale_timeout_sec: 1.5
    ultrasonic_min_valid_m: 0.03
    # Autonomous motion fails closed unless every installed ultrasonic is fresh.
    min_ultrasonic_online: 4
    require_localization_healthy: false
    localization_timeout_sec: 2.5
