safety_supervisor_node:
  ros__parameters:
    # UNMANNED first-pass autonomy profile (no passenger, clear test area).
    # This keeps the unmanned demo much looser than the manned profile, but the
    # collision test showed that a pure 10 cm trigger is too late. 10 cm remains
    # the hard floor; slowdown/stop happen earlier so the chair can turn away.
    cmd_vel_nav_topic: /cmd_vel_nav
    cmd_vel_safe_topic: /cmd_vel_safe
    scan_topic: /scan
    safety_state_topic: /safety_state
    emergency_stop_hw_topic: /emergency_stop_hw
    emergency_stop_sw_topic: /emergency_stop_sw
    ultrasonic_topics:
      - /ultrasonic/range_0
      - /ultrasonic/range_1
      - /ultrasonic/range_2
      - /ultrasonic/range_3
    # Four-sensor layout:
    #   range_0/address 1 = left-front, range_1/address 2 = left side
    #   range_2/address 3 = right-front, range_3/address 4 = right side
    front_ultrasonic_topics:
      - /ultrasonic/range_0
      - /ultrasonic/range_2
    side_ultrasonic_topics:
      - /ultrasonic/range_1
      - /ultrasonic/range_3
    max_auto_speed: 0.05
    debug_max_speed: 0.08
    hard_max_speed: 0.10
    max_angular_speed: 0.22
    allow_reverse_motion: false
    allow_rotation_when_blocked: true
    max_reverse_speed: 0.10
    rotate_in_place_angular_threshold: 0.05
    rotation_stop_distance: 0.12
    warning_distance: 0.60
    slowdown_distance: 0.40
    stop_distance: 0.30
    emergency_distance: 0.10
    front_ultrasonic_stop_distance: 0.30
    front_ultrasonic_slowdown_distance: 0.40
    front_ultrasonic_emergency_distance: 0.10
    side_ultrasonic_stop_distance: 0.10
    side_ultrasonic_warning_distance: 0.18
    side_ultrasonic_emergency_distance: 0.05
    t_delay: 0.35
    a_brake: 0.8
    d_margin: 0.08
    front_angle_min_deg: -70.0
    front_angle_max_deg: 70.0
    publish_rate_hz: 20.0
    stale_timeout_sec: 1.0
    ultrasonic_stale_timeout_sec: 1.5
    ultrasonic_min_valid_m: 0.03
    # Current RS485 ultrasonic chain is unstable/no-message on the bench.
    # Do not block the unmanned first-pass run just because ultrasonic topics
    # are stale; when messages are present, they still participate in stop logic.
    min_ultrasonic_online: 0
    require_localization_healthy: false
    localization_timeout_sec: 2.5
