ultrasonic_adapter_node:
  ros__parameters:
    mode: real
    publish_rate_hz: 20.0
    serial_port: /dev/smartwheel_ultrasonic
    baud_rate: 9600
    serial_timeout_sec: 0.08
    # FD07-34 commonly exposes actual distance in holding register 0x0001.
    # If your sensor is configured to use the processed value, change to 0x0002.
    register: 1
    # 4 RS485 sensors -> /ultrasonic/range_0..3, matching safety_params.yaml.
    # Re-address the sensors to 1..4 first. A sensor that fails to read is simply
    # not published (it goes stale) rather than faking max range.
    sensor_addresses: [1, 2, 3, 4]
    sensor_indices: [0, 1, 2, 3]
    enabled_count: 4
    min_range: 0.03
    max_range: 3.0
    field_of_view: 0.45
