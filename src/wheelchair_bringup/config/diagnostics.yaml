sensor_watchdog_node:
  ros__parameters:
    startup_grace_sec: 8.0
    publish_rate_hz: 2.0
    scan_timeout_sec: 0.8
    odom_timeout_sec: 1.0
    base_timeout_sec: 1.0
    imu_timeout_sec: 1.5
    imu_critical: true
    ultrasonic_timeout_sec: 1.5
    ultrasonic_topics:
      - /ultrasonic/range_0
      - /ultrasonic/range_1
      - /ultrasonic/range_2
      - /ultrasonic/range_3
    ultrasonic_0_critical: true
    ultrasonic_1_critical: true
    ultrasonic_2_critical: true
    ultrasonic_3_critical: true
    camera_timeout_sec: 5.0
    camera_topics:
      - /camera/left/image_raw
      - /camera/right/image_raw
    points_timeout_sec: 1.5
    points_topics:
      - /xtm60/left/points
      - /xtm60/right/points
      # Legacy single-radar topic, used only when enable_dual_xtm60:=false.
      # - /xtm60/points
    points_0_critical: true
    points_1_critical: true

localization_health_node:
  ros__parameters:
    publish_rate_hz: 2.0
    # AMCL only republishes /amcl_pose after the robot MOVES; when stationary it
    # holds the pose via the map->odom TF. A short age here falsely flags a
    # parked-but-localized robot as LOST -> safety zeroes /cmd_vel_safe -> it can
    # never start moving (chicken-and-egg). Covariance + scan + odom freshness
    # remain the real "am I localized / are sensors alive" gates.
    max_amcl_age_sec: 1000000.0
    max_odom_age_sec: 1.0
    max_scan_age_sec: 1.0
    max_covariance_xy: 0.50
    max_covariance_yaw: 0.35

hardware_self_check_node:
  ros__parameters:
    run_once: true
    period_sec: 10.0
    scan_serial_ports: false
    h30_port: /dev/smartwheel_h30_imu
    h30_baud_rate: 460800
    ultrasonic_port: /dev/smartwheel_ultrasonic
    ultrasonic_baud_rate: 9600
    ultrasonic_addresses: [1, 2, 3, 4]
    ultrasonic_register: 1
    camera_devices: ["0", "2"]
    xtm60_sdk_root: "/home/nvidia/smartwheel/xtsdk_py"
    xtm60_ip_address: 192.168.1.101
    xtm60_ip_addresses:
      - 192.168.0.101
      - 192.168.1.101
    xtm60_tcp_port: 0
    zlac_port: /dev/ttyUSB2
    zlac_baud_rate: 115200
    zlac_slave_id: 1
    zlac_probe_register: -1
