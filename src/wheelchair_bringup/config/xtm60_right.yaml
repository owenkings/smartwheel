xtm60_right_adapter_node:
  ros__parameters:
    sdk_root: "/home/nvidia/smartwheel/xtsdk_py"
    connection_mode: ethernet
    ip_address: "192.168.1.101"
    serial_port: ""
    image_type: 4
    frame_id: xtm60_right_link
    publish_rate_hz: 10.0
    use_sdk_timestamps: false

    point_unit_scale: 1.0
    range_min: 0.05
    range_max: 20.0
    publish_intensity: true

    enable_sdk_filters: true
    kalman_factor: 300
    kalman_threshold: 200
    kalman_range: 2000
    median_size: 3
    edge_threshold: 150
    reconnect_interval_sec: 3.0
    require_ping_before_start: true
    frame_timeout_sec: 8.0
    # The SDK binds its local receive socket to 7687. The launch shim pins that
    # socket to 192.168.1.100 so it cannot consume left-radar packets. The device
    # must therefore also send to 7687 (matching the bound receive port); the old
    # 7688 value left the receive socket and device port mismatched -> no frames.
    udp_dest_ip: "192.168.1.100"
    udp_dest_port: 7687
