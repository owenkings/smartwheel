ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.2
    two_d_mode: true            # wheelchair drives on a planar floor; keeps Nav2 happy
    transform_time_offset: 0.0
    transform_timeout: 0.1
    print_diagnostics: true

    # publish_tf is overridden by bringup_3d_slam.launch.py based on tf_owner.
    # Only ONE node may publish odom->base_link. When tf_owner:=ekf this EKF
    # owns it; ZLAC publish_tf and the LIVO backend TF must both be off.
    publish_tf: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # odom0: wheel encoders (ZLAC8030D) - planar x/y + yaw and their velocities.
    odom0: /wheel/odom
    odom0_config: [true,  true,  false,
                   false, false, true,
                   true,  true,  false,
                   false, false, true,
                   false, false, false]
    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 10

    # odom1: LIVO pose (loose coupling). Used as a relative pose/velocity source
    # so LIVO drift does not yank the filter; wheel odom anchors short-term
    # motion. This is NOT a tight coupling into the LIVO optimizer.
    odom1: /livo/odom
    odom1_config: [true,  true,  false,
                   false, false, true,
                   true,  true,  false,
                   false, false, true,
                   false, false, false]
    odom1_differential: true
    odom1_relative: false
    odom1_queue_size: 10

    # IMU: yaw + yaw rate (+ x accel). Not a standalone localization source.
    imu0: /imu/data
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  true,  false, false]
    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: true
    imu0_queue_size: 10
