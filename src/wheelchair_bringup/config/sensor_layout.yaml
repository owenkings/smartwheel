# Initial sensor extrinsics for the first prototype.
# These are estimates only. In the real wheelchair, measure them mechanically
# and verify all axes in RViz before any passenger test.
frames:
  base_link:
    note: "X forward, Y left, Z up. Origin near chassis center or drive axle midpoint."
  laser_link:
    xyz: [0.45, 0.0, 0.65]
    rpy: [0.0, -0.0873, 0.0]
  imu_link:
    xyz: [0.0, 0.0, 0.45]
    rpy: [0.0, 0.0, 0.0]
  camera_front_link:
