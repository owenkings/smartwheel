    rpy: [0.0, 0.0, 1.5708]
  camera_right_link:
    xyz: [0.0, -0.32, 0.75]
    rpy: [0.0, 0.0, -1.5708]
  camera_rear_link:
    xyz: [-0.45, 0.0, 0.75]
    rpy: [0.0, 0.0, 3.1416]
  ultrasonic_0_link:   # left-front (range_0, addr 1)
