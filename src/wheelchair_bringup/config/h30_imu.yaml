imu_adapter_node:
  ros__parameters:
    mode: real
    frame_id: imu_link
    publish_rate_hz: 100.0
    serial_port: /dev/ttyUSB0
    baud_rate: 460800
    serial_timeout_sec: 0.01
    orientation_covariance: [0.05, 0.05, 0.10]
    angular_velocity_covariance: [0.02, 0.02, 0.02]
    linear_acceleration_covariance: [0.05, 0.05, 0.08]
