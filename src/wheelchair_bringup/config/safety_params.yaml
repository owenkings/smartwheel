safety_supervisor_node:
  ros__parameters:
    cmd_vel_nav_topic: /cmd_vel_nav
    cmd_vel_safe_topic: /cmd_vel_safe
    scan_topic: /scan
    safety_state_topic: /safety_state
    emergency_stop_hw_topic: /emergency_stop_hw
    emergency_stop_sw_topic: /emergency_stop_sw
    ultrasonic_topics:
      - /ultrasonic/range_0
      - /ultrasonic/range_1
      - /ultrasonic/range_2
      - /ultrasonic/range_3
    max_auto_speed: 0.25
    debug_max_speed: 0.35
    hard_max_speed: 0.5
    max_angular_speed: 0.6
    allow_reverse_motion: false
    max_reverse_speed: 0.15
    rotate_in_place_angular_threshold: 0.2
    rotation_stop_distance: 0.7
    warning_distance: 1.5
    slowdown_distance: 1.0
    stop_distance: 0.6
    emergency_distance: 0.35
    t_delay: 0.35
    a_brake: 0.8
    d_margin: 0.25
    front_angle_min_deg: -35.0
    front_angle_max_deg: 35.0
    publish_rate_hz: 20.0
    stale_timeout_sec: 1.0
    ultrasonic_stale_timeout_sec: 1.5
    # Front ultrasonics sit ~0.5 m behind the chair's front edge; readings below
    # this are the chair's own footrest/frame (false positives) and are discarded.
    # The LiDAR front-cone scan-distance stop remains the real collision guard.
    ultrasonic_min_valid_m: 0.50
    # Ultrasonic is useful close-range redundancy, but the current autonomous
    # baseline must still run with radar/scan-only safety when the RS485
    # ultrasonic chain is absent or under repair.
    min_ultrasonic_online: 0
    require_localization_healthy: false
    localization_timeout_sec: 2.5

velocity_limiter_node:
  ros__parameters:
    input_topic: /cmd_vel_nav
    output_topic: /cmd_vel_limited
    max_linear_x: 0.25
    max_angular_z: 0.6

emergency_stop_node:
  ros__parameters:
    output_topic: /emergency_stop_sw
