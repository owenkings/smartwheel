safety_supervisor_node:
  ros__parameters:
    cmd_vel_nav_topic: /cmd_vel_nav
    cmd_vel_safe_topic: /cmd_vel_safe
    scan_topic: /scan
    safety_state_topic: /safety_state
    emergency_stop_hw_topic: /emergency_stop_hw
    emergency_stop_sw_topic: /emergency_stop_sw
    ultrasonic_topics:
      - /ultrasonic/range_0
      - /ultrasonic/range_1
      - /ultrasonic/range_2
      - /ultrasonic/range_3
    front_ultrasonic_topics:
      - /ultrasonic/range_0
      - /ultrasonic/range_2
    side_ultrasonic_topics:
      - /ultrasonic/range_1
      - /ultrasonic/range_3
    max_auto_speed: 0.25
    debug_max_speed: 0.35
    hard_max_speed: 0.5
    max_angular_speed: 0.6
    allow_reverse_motion: false
    max_reverse_speed: 0.15
    rotate_in_place_angular_threshold: 0.2
    rotation_stop_distance: 0.7
    warning_distance: 0.80
    slowdown_distance: 0.40
    stop_distance: 0.30
    emergency_distance: 0.10
    front_ultrasonic_stop_distance: 0.30
    front_ultrasonic_slowdown_distance: 0.40
    front_ultrasonic_emergency_distance: 0.10
    side_ultrasonic_stop_distance: 0.10
    side_ultrasonic_warning_distance: 0.20
    side_ultrasonic_emergency_distance: 0.05
    t_delay: 0.35
    a_brake: 0.8
    d_margin: 0.25
    front_angle_min_deg: -35.0
    front_angle_max_deg: 35.0
    publish_rate_hz: 20.0
    stale_timeout_sec: 1.0
    ultrasonic_stale_timeout_sec: 1.5
    # Keep real close-range values. Front stop is 0.30 m for the current
    # unmanned test profile; 0.50 m caused the chair to rotate in place before
    # it could start moving in normal rooms. Side stop remains 0.10 m.
    ultrasonic_min_valid_m: 0.03
    # Ultrasonic is optional for the current unmanned test path. If the four
    # RS485 topics publish, they are used; if they are silent, radar /scan still
    # drives the 30 cm front stop.
    min_ultrasonic_online: 0
    require_localization_healthy: false
    localization_timeout_sec: 2.5

velocity_limiter_node:
  ros__parameters:
    input_topic: /cmd_vel_nav
    output_topic: /cmd_vel_limited
    max_linear_x: 0.25
    max_angular_z: 0.6

emergency_stop_node:
  ros__parameters:
    output_topic: /emergency_stop_sw
