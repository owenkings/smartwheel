ultrasonic_adapter_node:
  ros__parameters:
    mode: real
    publish_rate_hz: 10.0
    serial_port: /dev/smartwheel_ultrasonic
    baud_rate: 9600
    serial_timeout_sec: 0.2
    register: 1

    # Full stage-1 hardware layout: two side boxes, front + side ultrasonic on each box.
    # Re-address the four RS485 sensors to 1..4 before using this profile.
    sensor_addresses: [1, 2, 3, 4]
    sensor_indices: [0, 1, 2, 3]
    enabled_count: 4

    min_range: 0.03
    max_range: 3.0
    field_of_view: 0.45
