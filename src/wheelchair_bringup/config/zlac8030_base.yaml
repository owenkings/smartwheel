zlac8030_driver_node:
  ros__parameters:
    mode: real
    # KeepLINK/USB-RS485 should expose a Linux serial device. Pin this with a
    # udev rule on the AGX Orin before real driving.
    serial_port: /dev/smartwheel_zlac8030
    baud_rate: 115200
    serial_timeout_sec: 0.08

    # Many ZLAC8030 installations use one slave id per wheel. If your KeepLINK
    # bridge exposes a single dual-axis slave, set single_slave_dual_axis true.
    left_slave_id: 1
    right_slave_id: 1
    single_slave_dual_axis: true

    wheel_radius_m: 0.165
    wheel_separation_m: 0.58
    max_linear_mps: 0.25
    max_angular_rps: 0.6
    command_timeout_sec: 0.5
    # Autonomous demo profile: allow Nav2's /cmd_vel_safe path to write low
    # speed commands to the confirmed ZLAC8030D dual-axis speed registers.
    # Keep the hardware E-stop in reach. The first non-zero command issues
    # drive_enable (control word 8), engaging the holding brake until a stop
    # control word is sent by the driver or scripts/hardware_shutdown.sh.
    motion_control_enabled: true
    write_dual_axis_command_together: true
    initialize_motion_on_first_command: true
    # -1 = when /cmd_vel_safe falls to zero during autonomous driving (waypoint,
    # obstacle stop, e-stop), KEEP the servo ENABLED at zero speed so the wheels
    # are HELD (抱死) and the chair cannot roll on a slope. The servo is freed for
    # manual pushing only by clean base-driver shutdown, scripts/hardware_shutdown.sh,
    # or the GUI "开始建图" path (scripts/zlac8030_release.py), never auto-released
    # mid-drive. Set a positive value only if you want auto-release after idle.
    release_motion_after_zero_sec: -1.0
    publish_rate_hz: 50.0
    publish_tf: true
    odom_frame_id: odom
    base_frame_id: base_link

    # Direction depends on motor installation. Confirm on blocks with wheels
    # off the ground before any loaded test.
    # 2026-05-29: in real push test the driver reported negative x for forward
    # motion, so flip both invert flags relative to the original guess. Re-test
    # after this change; if forward push still gives negative x, swap the flags
    # back and try {invert_left: true, invert_right: true} or both false.
    invert_left: true
    invert_right: false

    # Register scaling depends on the configured ZLAC8030 speed unit. Start
    # with 1 register unit = 1 rpm only after the register map is verified.
    # 2026-05-29 calibration log (precise 1.5m push, 7.5 floor tiles × 20cm):
    #   r2r_scale=1.000 → push 1m(est) gave odom -5.6m (sign also wrong)
    #   r2r_scale=0.179 → push 1m(est) gave odom 1.47m
    #   r2r_scale=0.122 → push 1.5m(est) gave odom 1.0m (was wrong estimate)
    #   r2r_scale=0.183 → push 1.5m(precise) gave odom 2.45m  (over by 1.633)
    #   r2r_scale=0.112 → expecting 1.5m → odom 1.5m (close to 0.1 rpm/unit)
    # If a precise push still over/under reports, scale linearly:
    #   new_scale = current_scale * (real_distance / odom_distance)
    rpm_to_register_scale: 8.9
    register_to_rpm_scale: 0.112

    # ZLAC8030D registers confirmed on the current dual-axis RS485 setup.
    command_left_register: 8328   # 0x2088
    command_right_register: 8329  # 0x2089
    feedback_left_register: 8363   # 0x20AB
    feedback_right_register: 8364  # 0x20AC
    enable_register: -1
    enable_value: 1
    disable_value: 0
    control_mode_register: 8205    # 0x200D
    control_word_register: 8206    # 0x200E
    async_mode_register: 8207      # 0x200F
    velocity_mode_value: 3
    async_mode_value: 0
    clear_fault_value: 6
    drive_enable_value: 8
    stop_value: 7
    emergency_stop_value: 5
